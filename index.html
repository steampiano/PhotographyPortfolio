<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">Photos by @aspy7777</a>
    <button type="button" class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false" aria-controls="siteNav">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>
    <nav class="nav" id="siteNav">
      <a href="index.html" class="active">Gallery</a>
      <a href="other-work.html">Other Work</a>
      <a href="about.html">About</a>
    </nav>
  </div>
</header>

<main>
  <section id="highlights-section" class="highlights-section container" hidden>
    <h2>Featured</h2>
    <div class="featured-row" id="featuredRow"></div>
  </section>

  <section class="gallery-intro container">
    <h1>Recent work</h1>
    <p>A running collection of photos, newest first.</p>
    <div class="filters-row">
      <div class="event-filter" id="eventFilter" hidden>
        <button type="button" class="event-filter-btn" id="eventFilterBtn" aria-expanded="false" aria-haspopup="true">
          Filter by event <span class="event-filter-caret">&#9662;</span>
        </button>
        <div class="event-filter-panel" id="eventFilterPanel" hidden></div>
      </div>

      <div class="person-search" id="personSearch" hidden>
        <div class="person-search-input-wrap">
          <svg class="person-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="personSearchInput" placeholder="Search by handle&hellip;" autocomplete="off" aria-label="Search by handle" role="combobox" aria-expanded="false">
        </div>
        <div class="person-search-results" id="personSearchResults" role="listbox" hidden></div>
      </div>
    </div>
    <div class="active-person-filter" id="personSearchChip"></div>
  </section>

  <section id="gallery" class="gallery container" data-collection="fursuit" aria-live="polite">
    <p class="gallery-empty">Loading photos&hellip;</p>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <p>&copy; <span id="year"></span> aspy7777. Free to use with credit &mdash; see <a href="about.html#using-my-photos">Using My Photos</a>.</p>
    <div class="footer-social">
      <a class="social-link" href="https://instagram.com/aspy7777" target="_blank" rel="noopener noreferrer" aria-label="Instagram: @aspy7777">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="5"/>
          <circle cx="12" cy="12" r="4.2"/>
          <circle cx="17.4" cy="6.6" r="0.9" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a class="social-link" href="https://twitter.com/aspy7iv" target="_blank" rel="noopener noreferrer" aria-label="Twitter: @aspy7iv">
        <svg viewBox="0 0 512 512" fill="currentColor">
          <path d="M459.4 151.7c.325 4.548.325 9.097.325 13.65 0 138.72-105.6 298.6-298.6 298.6-59.45 0-114.68-17.22-161.13-47.11 8.447.974 16.57 1.299 25.34 1.299 49.06 0 94.21-16.57 130.3-44.83-46.13-.975-84.79-31.19-98.11-72.77 6.498.974 12.99 1.624 19.82 1.624 9.421 0 18.84-1.3 27.61-3.573-48.08-9.747-84.14-51.98-84.14-102.9v-1.299c13.97 7.797 30.21 12.67 47.43 13.32-28.26-18.84-46.78-51-46.78-87.43 0-19.5 5.197-37.39 14.29-52.98 51.65 63.67 129.3 105.3 216.4 109.8-1.624-7.797-2.599-15.92-2.599-24.04 0-57.85 46.78-104.9 104.9-104.9 30.21 0 57.53 12.67 76.7 33.14 23.72-4.548 46.46-13.32 66.63-25.34-7.797 24.37-24.37 44.83-46.13 57.85 21.12-2.273 41.62-8.122 60.45-16.24-14.29 20.79-32.16 39.31-52.63 54.25z"/>

      </a>
    </div>
  </div>
</footer>

<div id="lightbox" class="lightbox" hidden aria-modal="true" role="dialog">
  <div class="lightbox-progress" id="lightboxProgress" hidden>
    <div class="lightbox-progress-bar" id="lightboxProgressBar"></div>
  </div>
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
  <button class="lightbox-info-btn" id="lightboxInfoBtn" aria-label="Photo info" aria-expanded="false" hidden>i</button>
  <div class="lightbox-info-panel" id="lightboxInfoPanel">
    <dl class="exif-list" id="lightboxExifList"></dl>
  </div>
  <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous photo">&larr;</button>
  <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next photo">&rarr;</button>
  <figure class="lightbox-figure" id="lightboxFigure">
    <img class="lightbox-img" id="lightboxImg" src="" alt="" decoding="async">
    <figcaption class="lightbox-meta">
      <div class="lightbox-people" id="lightboxPeople"></div>
      <p class="lightbox-caption" id="lightboxCaption"></p>
      <p class="lightbox-sub"><span id="lightboxEvent"></span><span id="lightboxDate"></span></p>
      <div class="lightbox-actions">
        <a class="lightbox-action lightbox-full" id="lightboxFull" href="#">View full photo</a>
        <button type="button" class="lightbox-action lightbox-copy-link" id="lightboxCopyLink">Copy image link</button>
      </div>
    </figcaption>
  </figure>
</div>

<script src="js/main.js"></script>
</body>
</html>
