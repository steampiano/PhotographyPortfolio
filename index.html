<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography Portfolio</title>
<meta name="description" content="A photography portfolio.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">Photos by @aspy7777</a>
    <nav class="nav">
      <a href="index.html" class="active">Gallery</a>
      <a href="about.html">About</a>
    </nav>
  </div>
</header>

<main>
  <section id="highlights-section" class="highlights-section container" hidden>
    <h2>Featured</h2>
    <div class="carousel">
      <button class="carousel-btn carousel-prev" id="carouselPrev" aria-label="Previous highlight">&larr;</button>
      <div class="carousel-track" id="carouselTrack"></div>
      <button class="carousel-btn carousel-next" id="carouselNext" aria-label="Next highlight">&rarr;</button>
    </div>
  </section>

  <section class="gallery-intro container">
    <h1>Recent work</h1>
    <p>A running collection of photos, newest first.</p>
    <div class="event-filter" id="eventFilter" hidden>
      <button type="button" class="event-filter-btn" id="eventFilterBtn" aria-expanded="false" aria-haspopup="true">
        Filter by event <span class="event-filter-caret">&#9662;</span>
      </button>
      <div class="event-filter-panel" id="eventFilterPanel" hidden></div>
    </div>
  </section>

  <section id="gallery" class="gallery container" aria-live="polite">
    <p class="gallery-empty">Loading photos&hellip;</p>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <p>&copy; <span id="year"></span> aspy7777. Free to use with credit &mdash; see <a href="about.html#using-my-photos">Using My Photos</a>.</p>
    <div class="footer-social">
      <a class="social-link" href="https://instagram.com/aspy7777" target="_blank" rel="noopener noreferrer" aria-label="Instagram: @aspy7777">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="5"/>
          <circle cx="12" cy="12" r="4.2"/>
          <circle cx="17.4" cy="6.6" r="0.9" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a class="social-link" href="https://twitter.com/aspy7777" target="_blank" rel="noopener noreferrer" aria-label="Twitter: @aspy7777">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M5 5l14 14M19 5L5 19"/>
        </svg>
      </a>
    </div>
  </div>
</footer>

<div id="lightbox" class="lightbox" hidden aria-modal="true" role="dialog">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
  <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous photo">&larr;</button>
  <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next photo">&rarr;</button>
  <figure class="lightbox-figure" id="lightboxFigure">
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <figcaption class="lightbox-meta">
      <div class="lightbox-people" id="lightboxPeople"></div>
      <p class="lightbox-caption" id="lightboxCaption"></p>
      <p class="lightbox-sub"><span id="lightboxEvent"></span><span id="lightboxDate"></span></p>
      <a class="lightbox-full" id="lightboxFull" href="#">View full photo</a>
    </figcaption>
  </figure>
</div>

<script src="js/main.js"></script>
</body>
</html>
